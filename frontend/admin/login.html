<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | Menú Digital</title>
    <link rel="stylesheet" href="/admin/login.css" />
    <link rel="stylesheet" href="/features.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
 
    <body>

    <form class="site-login-card" id="loginForm">

      <div class="login-header">
        <span class="login-emoji">🍕</span>
        <h1 class="login-title">Panel Admin</h1>
        <p class="login-subtitle">Ingresá para gestionar tu menú</p>
      </div>

      <div class="login-field">
        <label for="usuario">Usuario</label>
        <input type="text" id="usuario" name="usuario" placeholder="tu usuario" required />
      </div>

      <div class="login-field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required />
      </div>

      <p class="login-error" id="loginError"></p>

      <button type="submit">Ingresar</button>
      <div classs="login-field" id="loginField">
        <p><a href="/admin/registro.html" class="link-log-reg">crear una cuenta</a></p>

      </div>

    </form>

    <script src="/admin/login.js"></script>
  </body>
